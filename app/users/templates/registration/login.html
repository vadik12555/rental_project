<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Вход</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-12 col-md-6 col-lg-4">
        <div class="card shadow-sm">
          <div class="card-body p-4">
            <h1 class="h4 mb-3">Вход</h1>

            {% if form.errors %}
              <div class="alert alert-danger">Проверь логин и пароль.</div>
            {% endif %}

            <form method="post" novalidate>
              {% csrf_token %}

              <div class="mb-3">
                <label class="form-label" for="id_username">Логин</label>
                <input class="form-control" type="text" name="username" autofocus required id="id_username" value="{{ form.username.value|default:'' }}">
              </div>

              <div class="mb-3">
                <label class="form-label" for="id_password">Пароль</label>
                <input class="form-control" type="password" name="password" required id="id_password">
              </div>

              {% if next %}
                <input type="hidden" name="next" value="{{ next }}">
              {% endif %}

              <button class="btn btn-primary w-100" type="submit">Войти</button>
            </form>

            <div class="mt-3 text-center">
              <a href="{% url 'signup' %}">Регистрация</a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
