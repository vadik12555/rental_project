<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>VibeShop — Главная</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <span class="navbar-brand">VibeShop</span>
        </div>
    </nav>
    <div class="container">
        <div class="row">
            {% for item in items %}
            <div class="col-md-4 mb-4">
                <div class="card h-100 shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title">{{ item.title }}</h5>
                        <p class="text-muted">{{ item.description }}</p>
                        <h4 class="text-primary">{{ item.price }} руб.</h4>
                        <p>Остаток: <strong>{{ item.stock }} шт.</strong></p>
                        <button class="btn btn-primary w-100">Купить (скоро)</button>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
